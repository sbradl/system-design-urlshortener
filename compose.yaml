services:
  frontend:
    build: frontend
    ports: 
      - 80:80
    depends_on:
      - shortener

  idstore_redis:
    image: redis:8.6.2-alpine
    ports:
      - 6379:6379
    volumes:
      - ./data/idstore_redis:/data
    command: redis-server --appendonly yes

  shortener:
    build: shortener
    ports:
      - 5000:8080
    depends_on:
      - urlstore_pg
      - idstore_redis
 
  redirector:
    build: redirector
    ports:
      - 5001:8080
    depends_on:
      - urlstore_pg

  urlstore_pg:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: urlshortener
      POSTGRES_PASSWORD: urlshortener
    ports:
      - 5432:5432
    volumes:
      - ./data/urlstore_pg:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

